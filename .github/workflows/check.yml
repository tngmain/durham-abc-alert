name: Durham ABC Drop Monitor

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Restore state
        uses: actions/cache@v3
        with:
          path: .state.json
          key: durhamabc-state

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          NTFY_TOPIC: durhamabc-trevor-38492
        run: python monitor.py

      - name: Save state
        uses: actions/cache@v3
        with:
          path: .state.json
          key: durhamabc-state